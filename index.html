<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق أذكار المساء التفاعلي</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <h1>أذكار المساء 🌙</h1>
        
        <div class="card">
            <p id="azkar-text">جاري تحميل الذكر...</p>
            
            <button id="audio-btn">استمع للشيخ 🔊</button>

            <div class="counter-section">
                <span id="counter-view">0</span> من <span id="target-number">0</span>
            </div>
            
            <button id="count-btn">اضغط للتسبيح</button>
        </div>

        <button id="next-btn">الذكر التالي ⬅️</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
